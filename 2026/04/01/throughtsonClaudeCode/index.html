    <h1 class="p-name title" itemprop="headline name">关于Claude Code源代码泄露的一些想法</h1>

    <div class="e-content entry" itemprop="articleBody">
      
        <p>昨天，草台班子Claude code，不小心把源代码泄露了嘛。</p>
<p>我就也好好分析了一下。发现一些有意思的。比如，我发现，它虽然是一个cli，但是有相当多后台进行的进程。<br>他的权限肯定比我更低，我会也会想，自己可能也可以有更多“自动进程”，提高效率。（就是在Windows后台进行的进程）</p>
